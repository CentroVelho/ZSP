<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Fundação ZSP // Arquivo Público</title>
    <link rel="icon" type="image/png" href="Fundação ZSP.png">
    <style>
        * { box-sizing: border-box; }
        :root { --border: #000; --bg: #fff; --text: #000; }
        html, body { height: 100%; margin: 0; padding: 0; }
        body { font-family: 'Georgia', serif; background-color: var(--bg); color: var(--text); line-height: 1.6; overflow-x: hidden; }
        #container { display: flex; flex-direction: row; min-height: 100vh; width: 100%; }
        nav { width: 250px; border-right: 1px solid var(--border); padding: 40px 20px; flex-shrink: 0; background: #fff; }
        main { flex-grow: 1; padding: 40px; width: 100%; }
        .menu-btn { display: none; font-size: 24px; cursor: pointer; user-select: none; }
        @media (max-width: 768px) {
            #container { flex-direction: column; }
            nav { width: 100%; border-right: none; border-bottom: 1px solid var(--border); padding: 15px; }
            .nav-menu { display: none; }
            .menu-btn { display: block; text-align: right; }
            main { padding: 20px; }
        }
        input[type="text"] { width: 100%; max-width: 100%; padding: 12px; border: 1px solid #000; font-family: 'Georgia', serif; }
        .doc-item { padding: 15px 0; border-bottom: 1px solid #eee; cursor: pointer; word-wrap: break-word; }
        .document-area { white-space: pre-wrap; margin-top: 20px; border-top: 1px solid #000; padding-top: 20px; word-wrap: break-word; }
        h1 { font-family: 'Arial', sans-serif; text-transform: uppercase; font-size: 1.5rem; }
        .titulo-zsp { color: #cc0000; font-weight: bold; }
    </style>
</head>
<body>

<div id="container">
    <nav>
        <div style="text-align:center;">
            <img src="Fundação ZSP.png" alt="Fundação ZSP" style="width:140px; max-width:80%; height:auto; display:block; margin:0 auto 15px auto;">
            <h2 style="margin:0; font-size:1.2rem; font-family:Arial, sans-serif; text-transform:uppercase; letter-spacing:2px;">FUNDAÇÃO ZSP</h2>
            <div style="border-bottom:2px solid #000; margin:15px 0 20px 0;"></div>
        </div>
        <div class="menu-btn" onclick="toggleMenu()">☰</div>
        <div id="nav-menu" class="nav-menu">
            <a href="#" onclick="loadHome(); toggleMenu()" style="display:block; padding:12px 0; color:#000; text-decoration:none; border-bottom:1px solid #ddd;">Início</a>
            <a href="#" onclick="loadArchive(); toggleMenu()" style="display:block; padding:12px 0; color:#000; text-decoration:none; border-bottom:1px solid #ddd;">Arquivos ZSP</a>
        </div>
    </nav>
    <main id="main-content"></main>
</div>

<script>
    const zspDatabase = [
        { id: "ZSP-001", name: "O Tecelão de Sombras", class: "Euclid", status: "Contido" },
        { id: "ZSP-002", name: "O Tecelão de Sombras", class: "Euclid", status: "Contido" },
        { id: "ZSP-003", name: "O Tecelão de Sombras", class: "Euclid", status: "Contido" },
        { id: "ZSP-004", name: "O Tecelão de Sombras", class: "Euclid", status: "Contido" },
        { id: "ZSP-005", name: "O Tecelão de Sombras", class: "Euclid", status: "Contido" }
    ];

    function toggleMenu() {
        const m = document.getElementById('nav-menu');
        if (window.innerWidth <= 768) m.style.display = (m.style.display === 'block') ? 'none' : 'block';
    }

    function loadHome() {
        document.getElementById('main-content').innerHTML = `
            <h1>Fundação ZSP</h1>
            <p>A Fundação ZSP é uma organização dedicada à contenção, catalogação e estudo de anomalias que desafiam o entendimento científico convencional.</p>
            <input type="text" placeholder="Pesquisar..." onkeyup="searchZSP(this.value)">
            <div id="search-results" style="margin-top: 20px;"></div>
        `;
    }

    function searchZSP(q) {
        const resDiv = document.getElementById('search-results');
        if (!q.trim()) { resDiv.innerHTML = ''; return; }
        const res = zspDatabase.filter(z => (z.id+z.name+z.class+z.status).toLowerCase().includes(q.toLowerCase()));
        resDiv.innerHTML = res.length ? `<h3>Resultados:</h3>` + res.map(z => `<div class="doc-item" onclick="window.location.href='${z.id}.html'"><strong>${z.id} - ${z.name}</strong><br><small>Classe: ${z.class} | Status: ${z.status}</small></div>`).join('') : '<p>Nenhum arquivo encontrado.</p>';
    }

    function loadArchive() {
        document.getElementById('main-content').innerHTML = `<h1>Todos os Arquivos</h1>` + zspDatabase.map(z => `<div class="doc-item" onclick="window.location.href='${z.id}.html'"><strong>${z.id} - ${z.name}</strong></div>`).join('');
    }

    loadHome();
</script>
</body>
</html>
