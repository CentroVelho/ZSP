<script>
    const zspDatabase = [
        { id: "ZSP-001", name: "O Tecelão de Sombras", class: "Euclid", status: "Contido", doc: "<div class='titulo-zsp'>PROCEDIMENTOS ESPECIAIS DE CONTENÇÃO</div>\n" +
                "\n" +
                "ZSP-001 encontra-se atualmente contido na Câmara Euclid-01 da Instalação ZSP-Prime. A câmara possui formato cilíndrico com 20 metros de diâmetro e 12 metros de altura.\n" +
                "\n" +
                "O ambiente deve permanecer permanentemente iluminado por refletores industriais capazes de manter níveis mínimos de 5.000 lux em toda a área de contenção. Sensores fotométricos monitoram continuamente a instalação e enviam alertas automáticos caso qualquer região da cela apresente níveis inferiores ao limite estabelecido.\n" +
                "\n" +
                "Objetos capazes de criar sombras extensas são proibidos dentro da câmara. Equipamentos de manutenção devem possuir iluminação própria e permanecer ativos durante toda a permanência no local.\n" +
                "\n" +
                "Em caso de falha elétrica, geradores de emergência devem restaurar a iluminação em até três segundos. Caso esse limite seja ultrapassado, o Protocolo Eclipse deve ser imediatamente iniciado e todas as equipes de segurança do Setor Euclid devem entrar em estado de prontidão máxima.\n" +
                "\n" +
                "O acesso à contenção exige autorização de Nível 3 ou superior.\n" +
                "\n" +
                "────────────────────────────────────────\n" +
                "\n" +
                "<div class='titulo-zsp'>DESCRIÇÃO</div>\n" +
                "\n" +
                "ZSP-001 é uma entidade humanoide composta por uma substância negra desconhecida. A aparência geral lembra a silhueta de um homem extremamente alto e magro, medindo aproximadamente 2,7 metros de altura.\n" +
                "\n" +
                "Apesar dessa forma aparentemente fixa, observações prolongadas demonstram que seu corpo permanece em constante alteração. Partes da entidade frequentemente se dissolvem em uma fumaça escura antes de retornarem ao formato original.\n" +
                "\n" +

                "\n" +

                "\n" +
                "A principal característica anômala da entidade é sua capacidade de manipular sombras. ZSP-001 pode alterar o formato, o tamanho e a densidade de qualquer sombra existente dentro de sua área de influência.\n" +
                "\n" +

                "\n" +
                "────────────────────────────────────────\n" +
                "\n" +
                "<div class='titulo-zsp'>DESCOBERTA</div>\n" +
                "\n" +
                "O primeiro registro relacionado a ZSP-001 ocorreu em 17 de março de 1998.\n" +
                "\n" +
                "Moradores de uma região industrial abandonada começaram a relatar fenômenos incomuns durante o período noturno. Entre os relatos estavam desaparecimentos misteriosos, movimentação de sombras sem fonte de luz correspondente e figuras humanoides observadas dentro de prédios abandonados.\n" +
                "\n" +
                "Inicialmente os casos foram tratados como boatos locais.\n" +
                "\n" +
                "Entretanto, após o desaparecimento de onze pessoas em apenas duas semanas, autoridades regionais iniciaram investigações.\n" +
                "\n" +
                "As equipes encontraram diversos edifícios completamente vazios. Nenhum vestígio das vítimas foi localizado.\n" +
                "\n" +
                "A única evidência encontrada consistia em manchas negras espalhadas pelas paredes e pelo chão dos galpões abandonados.\n" +
                "\n" +
                "As manchas não correspondiam a nenhuma substância conhecida.\n" +
                "\n" +
                "Dias depois, câmeras de segurança instaladas temporariamente registraram uma figura humanoide emergindo da sombra de uma coluna de concreto.\n" +
                "\n" +
                "O vídeo mostrou a entidade observando o ambiente durante aproximadamente quarenta segundos antes de desaparecer novamente.\n" +
                "\n" +
                "Esse foi o primeiro registro visual oficial de ZSP-001.\n" +
                "\n" +
                "────────────────────────────────────────\n" +
                "\n" +
                "<div class='titulo-zsp'>PRIMEIRO CONTATO</div>\n" +
                "\n" +
                "Em 04 de abril de 1998, uma equipe de investigação foi enviada para explorar o galpão onde a entidade havia sido filmada.\n" +
                "\n" +
                "O grupo era composto por seis investigadores.\n" +
                "\n" +
                "A comunicação permaneceu normal durante os primeiros vinte minutos da operação.\n" +
                "\n" +

                "\n" +
                "────────────────────────────────────────\n" +
                "\n" +
                "<div class='titulo-zsp'>CAPTURA</div>\n" +
                "\n" +
                "A captura de ZSP-001 foi considerada uma das operações mais difíceis já realizadas durante os primeiros anos da Fundação ZSP.\n" +
                "\n" +
                "Após meses de observação, pesquisadores descobriram que a entidade apresentava comportamento defensivo quando exposta a níveis extremos de iluminação.\n" +

                "\n" +

                "\n" +

                "\n" +
                "Manipulação de Sombras\n" +

                "\n" +

                "\n" +

                "\n" +

                "\n" +
                "Testes demonstraram força suficiente para romper aço reforçado e concreto armado.\n" +
                "\n" +
                "Resistência Elevada\n" +
                "\n" +
                "Armas convencionais apresentam eficácia limitada contra a entidade.\n" +
                "\n" +
                "────────────────────────────────────────\n" +
                "\n" +
                "<div class='titulo-zsp'>COMPORTAMENTO</div>\n" +
                "\n" +

                "\n" +

                "\n" +

                "\n" +

                "\n" +
                "Pesquisadores acreditam que ZSP-001 possui objetivos próprios, embora sua natureza exata permaneça desconhecida.\n" +
                "\n" +
                "────────────────────────────────────────\n" +
                "\n" +
                "<div class='titulo-zsp'>INCIDENTE-001-A</div>\n" +
                "\n" +
                "Em 2003, uma falha elétrica de sete segundos ocorreu durante uma tempestade.\n" +
                "\n" +
                "Durante esse período, todas as câmeras da contenção perderam sinal.\n" +
                "\n" +
                "Quando a energia foi restaurada, ZSP-001 encontrava-se exatamente na mesma posição registrada antes da interrupção.\n" +
                "\n" +

                "\n" +

                "\n" +
                "────────────────────────────────────────\n" +
                "\n" +
                "<div class='titulo-zsp'>AVALIAÇÃO FINAL</div>\n" +
                "\n" +
                "ZSP-001 representa uma ameaça significativa caso obtenha acesso a grandes áreas de escuridão.\n" +
                "\n" +

                "\n" +
                "Por ser a primeira entidade oficialmente registrada pela Fundação ZSP, ZSP-001 permanece como um dos objetos de estudo mais importantes da organização.\n" +
                "\n" +
                "Monitoramento permanente é obrigatório." },
        { id: "ZSP-002", name: "A Sombra Agressiva", class: "Keter", status: "Contido", doc: "<div class='titulo-zsp'> ESPECIAIS DE CONTENÇÃO</div>\n" +
                "\n" +
                "ZSP-002 encontra-se contido na Câmara Keter-02 da Instalação ZSP-Prime. Devido às propriedades anômalas da entidade, a câmara foi construída para eliminar completamente qualquer área de escuridão.\n" +
                "\n" +
                "O ambiente possui formato circular com 30 metros de diâmetro e é equipado com um sistema de iluminação de emergência redundante composto por 612 refletores industriais. A intensidade luminosa mínima permitida é de 8.000 lux.\n" +

                "<div class='titulo-zsp'>DESCRIÇÃO</div>\n" +

                "\n" +

                "\n" +
                "A entidade não possui rosto, olhos ou qualquer estrutura anatômica visível.\n" +
                "\n" +
                "Mesmo assim, demonstra plena capacidade de percepção e consciência.\n" +
                "\n" +

                "\n" +
                "Sua principal característica é a capacidade de utilizar sombras como meio de movimentação, ocultação e ataque.\n" +
                "\n" +
                "────────────────────────────────────────\n" +
                "\n" +
                "<div class='titulo-zsp'>ORIGEM</div>\n" +
                "\n" +
                "A origem de ZSP-002 começou em 2007 na cidade de ███████.\n" +
                "\n" +
                "O caso teve início quando moradores locais começaram a relatar acontecimentos estranhos em um parque municipal localizado próximo a uma área de mata fechada.\n" +
                "\n" +

                "\n" +

                "\n" +

                "\n" +

                "\n" +

                "\n" +
                "A situação mudou quando um adolescente identificado como Marcelo Vieira sobreviveu a um encontro com a anomalia.\n" +
                "\n" +
                "────────────────────────────────────────\n" +
                "\n" +
                "<div class='titulo-zsp'>PRIMEIRO CONTATO</div>\n" +
                "\n" +
                "Na noite de 18 de agosto de 2007, Marcelo atravessava o parque para retornar para casa.\n" +
                "\n" +

                "\n" +

                "\n" +
                "<div class='titulo-zsp'>MANIFESTAÇÃO DA ENTIDADE</div>\n" +

                "\n" +

                "\n" +

                "\n" +

                "\n" +

                "\n" +

                "\n" +
                "────────────────────────────────────────\n" +
                "\n" +
                "<div class='titulo-zsp'>DESCOBERTA PELA FUNDAÇÃO</div>\n" +
                "\n" +

                "\n" +
                "<div class='titulo-zsp'>COMPORTAMENTO</div>\n" +

                "Pesquisadores acreditam que a entidade considera Marcelo uma espécie de ligação física com sua origem.\n" +
                "\n" +
                "Sempre que a oportunidade surge, tenta localizá-lo e eliminá-lo.\n" +
                "\n" +
                "Apesar de sua agressividade, ZSP-002 demonstra inteligência considerável.\n" +
                "\n" +
                "Registros mostram que a entidade é capaz de planejar emboscadas e explorar falhas de segurança.\n" +
                "\n" +
                "────────────────────────────────────────\n" +
                "\n" +
                "<div class='titulo-zsp'>INCIDENTE-002-A</div>\n" +
                "\n" +
                "Durante uma manutenção realizada em 2012, uma falha em um dos refletores criou uma pequena área de sombra próxima à parede oeste da câmara.\n" +
                "\n" +
                "Sensores registraram atividade anômala imediatamente.\n" +
                "\n" +
                "Uma extensão semelhante a um braço humano emergiu da sombra e tentou alcançar um técnico de manutenção.\n" +
                "\n" +
                "O sistema de emergência restaurou a iluminação antes que qualquer ferimento fosse registrado.\n" +
                "\n" +
                "O incidente resultou na instalação de refletores adicionais.\n" +
                "\n" +
                "────────────────────────────────────────\n" +
                "\n" +
                "<div class='titulo-zsp'>AVALIAÇÃO FINAL</div>\n" +
                "\n" +
                "ZSP-002 é considerada uma das entidades mais perigosas atualmente contidas pela Fundação ZSP.\n" +
                "\n" +
                "Sua capacidade de utilizar escuridão como arma, meio de locomoção e mecanismo de ocultação representa uma ameaça significativa para qualquer instalação.\n" +
                "\n" +
                "Embora permaneça contida, pesquisadores concordam que uma falha prolongada nos sistemas de iluminação poderia resultar em uma quebra de contenção de nível catastrófico.\n" +
                "\n" +
                "Por esse motivo, a entidade permanece classificada como Keter e sob vigilância permanente.\n" +
                "\n" +
                "Nível de ameaça: EXTREMO." },
        { id: "ZSP-003", name: "A Obediente Imperfeita", class: "Keter", status: "Contido", doc: "<div class='titulo-zsp'>PROCEDIMENTOS ESPECIAIS DE CONTENÇÃO</div>\n" +
                "\n" +
                "ZSP-003 encontra-se alojada em uma cela humanoide padrão localizada na Ala Keter da Instalação ZSP-Prime.\n" +
                "\n" +
                "Nenhum funcionário está autorizado a emitir ordens diretas à entidade.\n" +
                "\n" +
                "Toda comunicação deve ser realizada utilizando linguagem indireta, evitando palavras como \"faça\", \"vá\", \"pegue\", \"pare\", \"corra\", \"fique\" ou qualquer outra expressão que possa ser interpretada como comando.\n" +
                "\n" +
                "Testes envolvendo instruções verbais exigem autorização de Nível 4.\n" +
                "\n" +
                "Em caso de ativação acidental das propriedades anômalas da entidade, a área afetada deve ser evacuada imediatamente.\n" +
                "\n" +
                "────────────────────────────────────────\n" +
                "\n" +
                "<div class='titulo-zsp'>DESCRIÇÃO</div>\n" +
                "\n" +
                "ZSP-003 é uma adolescente de 15 anos chamada Larissa Mendes.\n" +
                "\n" +
                "Fisicamente, a entidade não apresenta diferenças significativas em relação a um ser humano comum.\n" +
                "\n" +
                "Entretanto, ZSP-003 manifesta uma anomalia cognitiva extremamente incomum.\n" +
                "\n" +
                "Sempre que recebe uma ordem direta que reconhece como comando, a entidade é forçada a tentar executá-la.\n" +
                "\n" +
                "Essa compulsão é involuntária e aparentemente impossível de resistir.\n" +
                "\n" +
                "Porém existe uma segunda característica anômala.\n" +
                "\n" +
                "ZSP-003 jamais consegue concluir uma ordem exatamente da forma como foi solicitada.\n" +
                "\n" +
                "Independentemente da simplicidade da tarefa, algum aspecto sempre falha.\n" +
                "\n" +
                "Em situações normais isso gera pequenos erros.\n" +
                "\n" +
                "Em situações complexas, os resultados podem desafiar as leis da física.\n" +
                "\n" +
                "────────────────────────────────────────\n" +
                "\n" +
                "<div class='titulo-zsp'>DESCOBERTA</div>\n" +
                "\n" +
                "O caso foi registrado pela Fundação ZSP em 2018.\n" +
                "\n" +
                "Professores da escola da entidade relataram acontecimentos impossíveis envolvendo a estudante.\n" +
                "\n" +
                "Durante uma aula, um professor ordenou:\n" +
                "\n" +
                "\"Escreva seu nome na lousa.\"\n" +
                "\n" +
                "Momentos depois, dezenas de nomes apareceram simultaneamente em diferentes partes da sala.\n" +
                "\n" +
                "Nenhum deles correspondia exatamente ao nome da entidade.\n" +
                "\n" +
                "Dias depois, outro incidente ocorreu.\n" +
                "\n" +
                "Ao ouvir a instrução:\n" +
                "\n" +
                "\"Feche a janela.\"\n" +
                "\n" +
                "A janela foi fechada.\n" +
                "\n" +
                "Entretanto, todas as outras janelas do corredor também foram fechadas instantaneamente.\n" +
                "\n" +
                "Os relatos chamaram a atenção das autoridades locais e posteriormente da Fundação ZSP.\n" +
                "\n" +
                "────────────────────────────────────────\n" +
                "\n" +
                "<div class='titulo-zsp'>CAPTURA</div>\n" +
                "\n" +
                "A contenção inicial foi extremamente difícil.\n" +
                "\n" +
                "A maioria das equipes desconhecia a natureza da anomalia.\n" +
                "\n" +
                "Durante uma tentativa de transporte, um agente ordenou:\n" +
                "\n" +
                "\"Entre no veículo.\"\n" +
                "\n" +
                "A entidade tentou obedecer.\n" +
                "\n" +
                "Como resultado, metade do corpo entrou no veículo enquanto a outra metade permaneceu do lado de fora sem sofrer qualquer dano físico.\n" +
                "\n" +
                "O fenômeno gerou uma distorção espacial temporária que destruiu o automóvel.\n" +
                "\n" +
                "Após diversos incidentes semelhantes, pesquisadores compreenderam o padrão da anomalia.\n" +
                "\n" +
                "A partir desse momento, procedimentos específicos foram desenvolvidos.\n" +
                "\n" +
                "────────────────────────────────────────\n" +
                "\n" +
                "<div class='titulo-zsp'>CAPACIDADES ANÔMALAS</div>\n" +
                "\n" +
                "Obediência Compulsória\n" +
                "\n" +
                "ZSP-003 é forçada a obedecer comandos diretos.\n" +
                "\n" +
                "Execução Imperfeita\n" +
                "\n" +
                "Nenhuma ordem pode ser realizada corretamente.\n" +
                "\n" +
                "Distorções de Realidade\n" +
                "\n" +
                "Em situações específicas, a tentativa de obedecer altera propriedades físicas do ambiente.\n" +
                "\n" +
                "Manipulação Involuntária\n" +
                "\n" +
                "A entidade pode produzir efeitos impossíveis sem intenção consciente.\n" +
                "\n" +
                "Imprevisibilidade Elevada\n" +
                "\n" +
                "Não existe método conhecido para prever exatamente como uma ordem irá falhar.\n" +
                "\n" +
                "────────────────────────────────────────\n" +
                "\n" +
                "<div class='titulo-zsp'>INCIDENTE-003-A</div>\n" +
                "\n" +
                "Durante um teste autorizado, um pesquisador instruiu:\n" +
                "\n" +
                "\"Empilhe três blocos.\"\n" +
                "\n" +
                "A entidade imediatamente tentou obedecer.\n" +
                "\n" +
                "Segundos depois, dois blocos foram empilhados normalmente.\n" +
                "\n" +
                "O terceiro bloco desapareceu.\n" +
                "\n" +
                "Após buscas extensivas, o objeto foi encontrado dentro de um cofre trancado em outro setor da instalação.\n" +
                "\n" +
                "────────────────────────────────────────\n" +
                "\n" +
                "<div class='titulo-zsp'>INCIDENTE-003-C</div>\n" +
                "\n" +
                "Em 2020, um funcionário recém-contratado ordenou acidentalmente:\n" +
                "\n" +
                "\"Fique parada.\"\n" +
                "\n" +
                "A entidade permaneceu imóvel.\n" +
                "\n" +
                "Entretanto, todos os relógios presentes no prédio interromperam seu funcionamento durante aproximadamente dez minutos.\n" +
                "\n" +
                "Quando a anomalia cessou, os relógios voltaram a funcionar normalmente.\n" +
                "\n" +
                "────────────────────────────────────────\n" +
                "\n" +
                "<div class='titulo-zsp'>INCIDENTE-003-F</div>\n" +
                "\n" +
                "Durante um experimento de alto risco, foi emitida a ordem:\n" +
                "\n" +
                "\"Cure seu machucado.\"\n" +
                "\n" +
                "A entidade tentou obedecer.\n" +
                "\n" +
                "O ferimento desapareceu.\n" +
                "\n" +
                "Entretanto, o braço afetado tornou-se temporariamente translúcido durante vinte e quatro horas.\n" +
                "\n" +
                "Nenhuma explicação científica foi encontrada.\n" +
                "\n" +
                "────────────────────────────────────────\n" +
                "\n" +
                "<div class='titulo-zsp'>COMPORTAMENTO</div>\n" +
                "\n" +
                "ZSP-003 apresenta personalidade cooperativa e educada.\n" +
                "\n" +
                "A entidade demonstra constante preocupação com os danos que suas habilidades podem causar.\n" +
                "\n" +
                "Durante entrevistas, afirmou diversas vezes que prefere permanecer isolada para evitar acidentes.\n" +
                "\n" +
                "Apesar de sua natureza não hostil, pesquisadores classificam a entidade como Keter devido ao potencial destrutivo imprevisível de suas propriedades anômalas.\n" +
                "\n" +
                "────────────────────────────────────────\n" +
                "\n" +
                "<div class='titulo-zsp'>AVALIAÇÃO FINAL</div>\n" +
                "\n" +
                "ZSP-003 não representa ameaça por intenção própria.\n" +
                "\n" +
                "Entretanto, qualquer ordem simples pode desencadear consequências impossíveis de prever.\n" +
                "\n" +
                "Simulações realizadas pela Fundação indicam que instruções inadequadas poderiam provocar distorções de realidade em larga escala.\n" +
                "\n" +
                "Por esse motivo, ZSP-003 permanece classificada como Keter.\n" +
                "\n" +
                "A Fundação ZSP considera a entidade uma das anomalias mais perigosas já registradas não por agressividade, mas pela impossibilidade de controlar os resultados de suas ações." },
        { id: "ZSP-004", name: "O Cartógrafo de Ausências", class: "Keter", status: "Contido", doc: "<div class='titulo-zsp'>PROCEDIMENTOS ESPECIAIS DE CONTENÇÃO</div>\n" +
                "\n" +
                "ZSP-004 está contido na Zona de Congelamento Cartográfico ZSP-Prime-04, localizada em uma área isolada do interior do Maranhão, Brasil.\n" +
                "\n" +
                "Toda a região de contenção é forçada a utilizar um único mapa oficial mantido pela Fundação ZSP.\n" +
                "\n" +
                "Nenhum sistema de GPS, satélite ou cartografia digital externo possui permissão para atualizar dados da área.\n" +
                "\n" +
                "Qualquer tentativa de registrar a região com mapas independentes resulta em inconsistências imediatas entre diferentes versões do mesmo espaço.\n" +
                "\n" +
                "Pesquisas cartográficas na área estão proibidas sem autorização de Nível 4.\n" +
                "\n" +
                "A entrada física na zona exige sincronização prévia de dados geográficos com o sistema central da Fundação.\n" +
                "\n" +
                "Em caso de divergência de localização detectada, a equipe deve interromper imediatamente a operação e aguardar recalibração do sistema.\n" +
                "\n" +
                "────────────────────────────────────────\n" +
                "\n" +
                "<div class='titulo-zsp'>DESCRIÇÃO</div>\n" +
                "\n" +
                "ZSP-004 é uma entidade de origem desconhecida que manifesta uma anomalia de reestruturação espacial cognitiva.\n" +
                "\n" +
                "A entidade não possui forma fixa.\n" +
                "\n" +
                "Quando observada diretamente, ZSP-004 apresenta aparência variável composta por:\n" +
                "\n" +
                "Fragmentos de mapas tridimensionais\n" +
                "\n" +
                "Linhas geográficas em constante movimento\n" +
                "\n" +
                "Estruturas semelhantes a cidades parcialmente dissolvidas\n" +
                "\n" +
                "Coordenas flutuantes que mudam de posição continuamente\n" +
                "\n" +
                "A entidade não possui voz registrada.\n" +
                "\n" +
                "Entretanto, sistemas de áudio próximos relatam ruídos semelhantes a “atualização de mapa em tempo real”.\n" +
                "\n" +
                "ZSP-004 não interage fisicamente com objetos.\n" +
                "\n" +
                "Sua influência ocorre exclusivamente sobre espaço, localização e registro de ambientes.\n" +
                "\n" +
                "────────────────────────────────────────\n" +
                "\n" +
                "<div class='titulo-zsp'>DESCOBERTA</div>\n" +
                "\n" +
                "ZSP-004 foi identificado em 2019 durante uma operação de mapeamento geográfico em área rural do Maranhão.\n" +
                "\n" +
                "Uma equipe de geógrafos foi enviada para validar a existência de uma estrada não registrada oficialmente.\n" +
                "\n" +
                "A equipe encontrou a estrada conforme relatado por moradores locais.\n" +
                "\n" +
                "Entretanto, nenhuma base de dados nacional ou internacional possuía registro da mesma.\n" +
                "\n" +
                "Uma segunda equipe foi enviada ao mesmo ponto 48 horas depois.\n" +
                "\n" +
                "A estrada não estava mais presente.\n" +
                "\n" +
                "No lugar, havia apenas vegetação nativa sem sinais de intervenção humana.\n" +
                "\n" +
                "Comparações entre relatórios revelaram que cada equipe possuía mapas diferentes da mesma região.\n" +
                "\n" +
                "A anomalia foi confirmada após três revisões independentes de satélite, todas apresentando versões incompatíveis da área.\n" +
                "\n" +
                "────────────────────────────────────────\n" +
                "\n" +
                "<div class='titulo-zsp'>CAPTURA</div>\n" +
                "\n" +
                "A contenção de ZSP-004 não envolveu captura física.\n" +
                "\n" +
                "Após 11 incidentes de inconsistência geográfica, a Fundação implementou o Protocolo M-Grid de Fixação Cartográfica.\n" +
                "\n" +
                "O protocolo consistiu em:\n" +
                "\n" +
                "Definição de uma versão única e obrigatória da geografia local\n" +
                "\n" +
                "Bloqueio de atualizações externas de mapas na área\n" +
                "\n" +
                "Sincronização contínua de todos os dispositivos de navegação\n" +
                "\n" +
                "Criação de emissores de estabilidade espacial ao redor da zona\n" +
                "\n" +
                "Após a ativação do protocolo, a área de influência de ZSP-004 apresentou redução significativa de instabilidade.\n" +
                "\n" +
                "A entidade permaneceu dentro da zona estabilizada sem tentativa de expansão por 72 horas consecutivas, sendo considerada contida.\n" +
                "\n" +
                "────────────────────────────────────────\n" +
                "\n" +
                "<div class='titulo-zsp'>CAPACIDADES ANÔMALAS</div>\n" +
                "\n" +
                "Reescrita Topográfica Ativa\n" +
                "\n" +
                "ZSP-004 altera a disposição física de espaços com base em versões alternativas de mapas.\n" +
                "\n" +
                "Inconsistência de Registro\n" +
                "\n" +
                "Diferentes sistemas de mapeamento apresentam versões incompatíveis da mesma área simultaneamente.\n" +
                "\n" +
                "Deslocamento Sem Movimento\n" +
                "\n" +
                "Objetos e estruturas podem mudar de posição sem deslocamento físico perceptível.\n" +
                "\n" +
                "Instabilidade Cognitiva Geográfica\n" +
                "\n" +
                "Indivíduos expostos começam a lembrar de versões diferentes do mesmo local.\n" +
                "\n" +
                "Reescrita Retroativa de Localização\n" +
                "\n" +
                "Ambientes podem “sempre ter estado” em posições diferentes dependendo do observador.\n" +
                "\n" +
                "────────────────────────────────────────\n" +
                "\n" +
                "<div class='titulo-zsp'>INCIDENTE-004-A</div>\n" +
                "\n" +
                "Durante um teste controlado, foi introduzido um mapa físico da região antes da contenção.\n" +
                "\n" +
                "O mapa começou a apresentar alterações espontâneas em tempo real.\n" +
                "\n" +
                "Estradas foram reposicionadas sem alteração física do ambiente.\n" +
                "\n" +
                "Duas salas da instalação passaram a constar em posições diferentes dependendo do observador.\n" +
                "\n" +
                "O experimento foi interrompido após 6 minutos.\n" +
                "\n" +
                "────────────────────────────────────────\n" +
                "\n" +
                "<div class='titulo-zsp'>INCIDENTE-004-C</div>\n" +
                "\n" +
                "Uma equipe de manutenção utilizou GPS padrão dentro da zona de contenção.\n" +
                "\n" +
                "Três dispositivos diferentes indicaram rotas distintas para o mesmo ponto.\n" +
                "\n" +
                "Um dos técnicos relatou chegada a um prédio inexistente nos demais sistemas.\n" +
                "\n" +
                "Ao retornar, o técnico não conseguiu mais localizar o caminho percorrido, apesar de mapas físicos indicarem a rota correta.\n" +
                "\n" +
                "────────────────────────────────────────\n" +
                "\n" +
                "<div class='titulo-zsp'>INCIDENTE-004-F</div>\n" +
                "\n" +
                "Durante tentativa de extração de amostra do solo, foi registrada uma mudança abrupta de coordenadas locais.\n" +
                "\n" +
                "O equipamento de perfuração foi encontrado posteriormente em um setor da instalação a 2 km de distância sem qualquer registro de transporte.\n" +
                "\n" +
                "Não foram detectados danos estruturais durante o deslocamento.\n" +
                "\n" +
                "────────────────────────────────────────\n" +
                "\n" +
                "<div class='titulo-zsp'>COMPORTAMENTO</div>\n" +
                "\n" +
                "ZSP-004 não demonstra agressividade.\n" +
                "\n" +
                "A entidade apresenta comportamento repetitivo de observação do ambiente como se estivesse “corrigindo” sua estrutura.\n" +
                "\n" +
                "Em diversos registros, ZSP-004 permanece imóvel por longos períodos em áreas limítrofes da contenção.\n" +
                "\n" +
                "A entidade reage a alterações em mapas com aproximação imediata do local afetado.\n" +
                "\n" +
                "Não há evidência de consciência comunicativa direta.\n" +
                "\n" +
                "────────────────────────────────────────\n" +
                "\n" +
                "<div class='titulo-zsp'>AVALIAÇÃO FINAL</div>\n" +
                "\n" +
                "ZSP-004 não altera matéria diretamente.\n" +
                "\n" +
                "Sua anomalia consiste na alteração da forma como o espaço é definido e interpretado por sistemas físicos e cognitivos.\n" +
                "\n" +
                "A Fundação ZSP classifica a entidade como Keter devido à impossibilidade de estabelecer uma geografia fixa dentro de sua área de influência.\n" +
                "\n" +
                "Enquanto ativo, ZSP-004 impede a existência de uma única versão estável de qualquer mapa relacionado à sua zona."},
         { id: "ZSP-005", name: "█████████████████", class: "Keter", status: "Contido", doc: "<div class='titulo-zsp'>PROCEDIMENTOS ESPECIAIS DE CONTENÇÃO</div>\n" +
                 "\n" +
                 "ZSP-005 não possui um protocolo de contenção tradicional.\n" +
                 "\n" +
                 "O objeto encontra-se armazenado em uma câmara padrão de segurança cognitiva na Instalação ZSP-Prime.\n" +
                 "\n" +

                 "\n" +
                 "────────────────────────────────────────\n" +
                 "\n" +
                 "<div class='titulo-zsp'>DESCRIÇÃO</div>\n" +

                 "\n" +

                 "\n" +

                 "\n" +

                 "\n" +
                 "Sujeitos sabem que ZSP-005 existe.\n" +
                 "\n" +
                 "Sujeitos sabem que o estudaram.\n" +
                 "\n" +
                 "Sujeitos sabem que ele foi observado.\n" +
                 "\n" +
                 "Mas não conseguem lembrar o que ele é.\n" +
                 "\n" +
                 "Informações negativas permanecem acessíveis por períodos significativamente maiores.\n" +
                 "\n" +
                 "────────────────────────────────────────\n" +
                 "\n" +
                 "<div class='titulo-zsp'>DESCOBERTA</div>\n" +
                 "\n" +
                 "ZSP-005 foi identificado durante análise de relatos inconsistentes provenientes de múltiplas instalações da Fundação ZSP.\n" +
                 "\n" +
                 "Diversos agentes relataram acesso a um objeto catalogado como “005”, porém nenhum conseguia descrever sua função.\n" +
                 "\n" +
                 "Registros escritos apresentavam degradação informacional incomum: descrições completas desapareciam parcialmente ao longo de horas ou dias, mantendo apenas negações e contradições.\n" +
                 "\n" +
                 "Após consolidação dos dados, o objeto foi classificado como anomalia cognitiva de alto risco e transferido para contenção.\n" +
                 "\n" +
                 "────────────────────────────────────────\n" +
                 "\n" +
                 "<div class='titulo-zsp'>CAPTURA</div>\n" +
                 "\n" +
                 "A contenção inicial foi realizada sem resistência física.\n" +
                 "\n" +
                 "Durante a operação, agentes relataram dificuldade progressiva em manter coerência sobre o propósito da missão.\n" +
                 "\n" +
                 "Comunicações internas apresentaram falhas semânticas leves, incluindo incapacidade temporária de definir o motivo da operação.\n" +
                 "\n" +
                 "A recuperação do objeto foi concluída com sucesso.\n" +
                 "\n" +
                 "Nenhum registro confiável da forma original do objeto foi preservado fora dos sistemas automatizados.\n" +
                 "\n" +
                 "────────────────────────────────────────\n" +
                 "\n" +
                 "<div class='titulo-zsp'>CAPACIDADES ANÔMALAS</div>\n" +
                 "\n" +
                 "Supressão de Memória Descritiva\n" +
                 "\n" +
                 "Informações sobre ZSP-005 são progressivamente esquecidas após exposição direta ou indireta.\n" +
                 "\n" +
                 "Persistência Existencial\n" +
                 "\n" +
                 "A entidade permanece lembrada como conceito de existência, mas não como descrição.\n" +
                 "\n" +
                 "Estabilidade Negativa\n" +
                 "\n" +
                 "Características que descrevem o que ZSP-005 não é tendem a permanecer consistentes entre sujeitos.\n" +
                 "\n" +
                 "Degradação de Registro\n" +
                 "\n" +
                 "Documentos físicos e digitais que tentam descrever o objeto sofrem perda parcial de conteúdo ao longo do tempo.\n" +
                 "\n" +
                 "────────────────────────────────────────\n" +
                 "\n" +
                 "<div class='titulo-zsp'>ADENDO-005-01</div>\n" +
                 "\n" +
                 "Transcrição de Entrevista\n" +
                 "\n" +
                 "Entrevistador: Supervisor Henrique Alves\n" +
                 "Entrevistado: █████████\n" +
                 "\n" +
                 "[INÍCIO DO REGISTRO]\n" +
                 "\n" +
                 "Supervisor Henrique Alves:\n" +
                 "Ok, vou precisar te fazer algumas perguntas sobre o número 005 agora.\n" +
                 "\n" +
                 "█████████:\n" +
                 "Número qual?\n" +
                 "\n" +
                 "Supervisor Henrique Alves:\n" +
                 "Objeto ZSP-005. O objeto que você acabou de examinar.\n" +
                 "\n" +
                 "█████████:\n" +
                 "O quê? Eu… <sujeito parece desconfortável> … não sei do que você está falando.\n" +
                 "\n" +
                 "Supervisor Henrique Alves:\n" +
                 "Você se lembra da sessão de observação?\n" +
                 "\n" +
                 "█████████:\n" +
                 "Eu lembro de ter estado em uma sala. Acho que havia algo lá. Mas não consigo dizer o que era.\n" +
                 "\n" +
                 "Supervisor Henrique Alves:\n" +
                 "Descreva qualquer característica.\n" +
                 "\n" +
                 "█████████:\n" +
                 "Não posso. Quando tento, isso desaparece.\n" +
                 "\n" +
                 "Supervisor Henrique Alves:\n" +
                 "O que você consegue afirmar com certeza?\n" +
                 "\n" +
                 "█████████:\n" +
                 "Que não era vivo. Não era uma pessoa. E não era algo comum.\n" +
                 "\n" +
                 "Supervisor Henrique Alves:\n" +
                 "Como você sabe disso?\n" +
                 "\n" +
                 "█████████:\n" +
                 "Porque isso é a única coisa que não desaparece.\n" +
                 "\n" +
                 "Supervisor Henrique Alves:\n" +
                 "Então você não consegue dizer o que é, apenas o que não é.\n" +
                 "\n" +
                 "█████████:\n" +
                 "Sim. E isso parece ser o máximo que alguém consegue lembrar.\n" +
                 "\n" +
                 "[FIM DO REGISTRO]\n" +
                 "\n" +
                 "────────────────────────────────────────\n" +
                 "\n" +
                 "<div class='titulo-zsp'>ADENDO-005-02</div>\n" +
                 "\n" +
                 "Nota de Revisão Cognitiva\n" +
                 "\n" +
                 "Durante análise longitudinal de múltiplas entrevistas, observou-se que sujeitos mantêm estabilidade apenas em descrições negativas relacionadas a ZSP-005.\n" +
                 "\n" +
                 "Tentativas de reconstrução completa da identidade do objeto resultam em perda progressiva de coerência narrativa.\n" +
                 "\n" +
                 "Recomenda-se que futuras investigações evitem qualquer tentativa de definição direta.\n" +
                 "\n" +
                 "────────────────────────────────────────\n" +
                 "\n" +
                 "<div class='titulo-zsp'>AVALIAÇÃO FINAL</div>\n" +
                 "\n" +
                 "ZSP-005 não pode ser descrito de forma consistente por observadores humanos.\n" +
                 "\n" +
                 "A entidade não parece destruir informação, mas impedir sua retenção semântica completa.\n" +
                 "\n" +
                 "A Fundação ZSP mantém ZSP-005 sob contenção cognitiva e monitora possíveis efeitos de degradação informacional em escala institucional."}
    ];

    function toggleMenu() {
        const m = document.getElementById('nav-menu');
        if (window.innerWidth <= 768) m.style.display = (m.style.display === 'block') ? 'none' : 'block';
    }

    function loadHome() {
        document.getElementById('main-content').innerHTML = `
            <h1>Fundação ZSP</h1>
            <p>A Fundação ZSP é uma organização dedicada à contenção, catalogação e estudo de anomalias que desafiam o entendimento científico convencional.</p>
            <input type="text" placeholder="Pesquisar..." onkeyup="searchZSP(this.value)">
            <div id="search-results" style="margin-top: 20px;"></div>
        `;
    }

    function searchZSP(q) {
        const resDiv = document.getElementById('search-results');
        if (!q.trim()) { resDiv.innerHTML = ''; return; }
        const res = zspDatabase.filter(z => (z.id+z.name+z.class+z.status).toLowerCase().includes(q.toLowerCase()));
        resDiv.innerHTML = res.length ? `<h3>Resultados:</h3>` + res.map(z => `<div class="doc-item" onclick="viewDoc('${z.id}')"><strong>${z.id} - ${z.name}</strong><br><small>Classe: ${z.class} | Status: ${z.status}</small></div>`).join('') : '<p>Nenhum arquivo encontrado.</p>';
    }

    function viewDoc(id) {
        const z = zspDatabase.find(x => x.id === id);
        document.getElementById('main-content').innerHTML = `<h1>${z.id}</h1><p><b>Nome:</b> ${z.name}<br><b>Classe:</b> ${z.class}<br><b>Status:</b> ${z.status}</p><div class="document-area">${z.doc}</div><br><button onclick="loadHome()">Voltar</button>`;
    }

    function loadArchive() {
        document.getElementById('main-content').innerHTML = `<h1>Todos os Arquivos</h1>` + zspDatabase.map(z => `<div class="doc-item" onclick="viewDoc('${z.id}')"><strong>${z.id} - ${z.name}</strong></div>`).join('');
    }

    loadHome();
</script>
</body>
</html>
